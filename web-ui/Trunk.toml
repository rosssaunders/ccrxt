[build]
target = "index.html"
dist = "dist"
# Disable inline scripts for Chrome extension compatibility
inline_scripts = false

[watch]
# Paths to watch for automatic rebuilding
watch = ["src", "index.html", "manifest.json", "background.js"]

[serve]
# Local development server configuration
address = "127.0.0.1"
port = 8080
open = false

# Extension build assets
[[hooks]]
stage = "post_build"
command = "sh"
command_args = ["-c", "echo 'Copying extension files...' && cp manifest.json background.js dist/ && echo 'Copy complete'"]