[build]
target = "index.html"
dist = "dist"
# Chrome extension compatibility settings
inline_scripts = false
public_url = "./"
# Disable integrity checks for Chrome extensions
filehash = false

[watch]
# Paths to watch for automatic rebuilding
watch = ["src", "index.html", "manifest.json", "background.js"]

[serve]
# Local development server configuration
address = "127.0.0.1"
port = 8080
open = false

# Extension build assets
[[hooks]]
stage = "post_build"
command = "./final_fix.sh"